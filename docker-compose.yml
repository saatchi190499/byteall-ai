services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: codegen-pgvector
    environment:
      POSTGRES_DB: ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Default Ollama service (CPU-safe). For GPU, use docker-compose.gpu.yml override.
  ollama:
    image: ollama/ollama:latest
    container_name: codegen-ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codegen-backend
    depends_on:
      - pgvector
      - ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:8b}
      OLLAMA_CHAT_FALLBACK_MODELS: ${OLLAMA_CHAT_FALLBACK_MODELS:-llama3.1:latest,qwen2.5-coder:3b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      OLLAMA_CHAT_NUM_CTX: ${OLLAMA_CHAT_NUM_CTX:-4096}
      OLLAMA_CHAT_NUM_PREDICT: ${OLLAMA_CHAT_NUM_PREDICT:-512}
      OLLAMA_CHAT_TEMPERATURE: ${OLLAMA_CHAT_TEMPERATURE:-0.1}
      OLLAMA_CHAT_TOP_P: ${OLLAMA_CHAT_TOP_P:-0.9}
      OLLAMA_CHAT_REPEAT_PENALTY: ${OLLAMA_CHAT_REPEAT_PENALTY:-1.05}
      OLLAMA_CHAT_NUM_THREAD: ${OLLAMA_CHAT_NUM_THREAD:-0}
      OLLAMA_CHAT_NUM_GPU: ${OLLAMA_CHAT_NUM_GPU:--1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      PDF_DIR: /app/data/pdfs
      TUTORIALS_DIR: /app/data/tutorials
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/ai_agent
      VECTOR_TABLE_NAME: rag_chunks
      EMBED_WORKERS: ${EMBED_WORKERS:-4}
      INDEX_BATCH_SIZE: ${INDEX_BATCH_SIZE:-24}
      CHUNK_SIZE: ${CHUNK_SIZE:-900}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      TOP_K: ${TOP_K:-4}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,https://btlweb}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: codegen-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgvector_data:
  ollama_data:
